<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>私だけの書斎 — 学習のあかり</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500&family=Zen+Kaku+Gothic+Antique:wght@300;400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { overflow-x: hidden; }

    :root {
      --bg:       #17100a;
      --panel:    rgba(42, 28, 14, 0.60);
      --text:     #f0e4cc;
      --muted:    #9a7a50;
      --gold:     #c8a040;
      --leading:  #0c0805;
      --glass-off:#1d1610;
      --border:   rgba(154,122,80,0.20);
    }

    html { -webkit-text-size-adjust: 100%; }

    body {
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse 100% 45% at 50% -2%, rgba(80,52,20,0.45) 0%, transparent 100%),
        radial-gradient(ellipse  60% 30% at 50% 100%, rgba(20,12,5,0.6)  0%, transparent 80%);
      color: var(--text);
      font-family: 'Shippori Mincho', 'Hiragino Mincho ProN', 'Yu Mincho', serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      padding: 4vh 1.2rem 8vh;
      padding-left:  max(1.2rem, env(safe-area-inset-left));
      padding-right: max(1.2rem, env(safe-area-inset-right));
      padding-bottom: max(8vh, env(safe-area-inset-bottom));
    }

    .app {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.6rem;
    }

    /* ── Header ─────────────────────────── */
    header { text-align: center; }

    .eyebrow {
      font-family: 'Zen Kaku Gothic Antique', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.4em;
      color: var(--muted);
      margin-bottom: 0.9rem;
    }

    h1 {
      font-size: 1.9rem;
      font-weight: 400;
      color: var(--gold);
      letter-spacing: 0.18em;
      margin-bottom: 0.45rem;
    }

    .header-sub {
      font-family: 'Zen Kaku Gothic Antique', sans-serif;
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 300;
      letter-spacing: 0.07em;
    }

    /* ── Subject tabs row ───────────────── */
    .subjects-row {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .sub-tab {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Zen Kaku Gothic Antique', sans-serif;
      font-size: 0.72rem;
      padding: 0.28rem 0.85rem;
      border-radius: 20px;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: all 0.35s ease;
      white-space: nowrap;
    }

    .sub-tab:hover { border-color: rgba(200,160,64,0.35); color: var(--text); }

    .sub-tab.active {
      background: rgba(200,160,64,0.10);
      border-color: rgba(200,160,64,0.45);
      color: var(--gold);
    }

    .btn-add-sub {
      background: transparent;
      border: 1px dashed var(--border);
      color: var(--muted);
      font-family: 'Zen Kaku Gothic Antique', sans-serif;
      font-size: 0.72rem;
      padding: 0.28rem 0.7rem;
      border-radius: 20px;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: all 0.35s ease;
    }

    .btn-add-sub:hover { border-color: rgba(200,160,64,0.35); color: var(--text); }

    .btn-settings {
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 1rem;
      cursor: pointer;
      padding: 0.2rem 0.3rem;
      opacity: 0.55;
      transition: opacity 0.3s, color 0.3s;
      line-height: 1;
    }

    .btn-settings:hover  { opacity: 1; }
    .btn-settings.active { color: var(--gold); opacity: 0.9; }

    /* ── Settings panel ── */
    .settings-wrap {
      width: 100%;
      display: grid;
      grid-template-rows: 0fr;
      opacity: 0;
      transition: grid-template-rows 0.55s ease, opacity 0.5s ease;
    }

    .settings-wrap.open {
      grid-template-rows: 1fr;
      opacity: 1;
    }

    .settings-inner { overflow: hidden; }

    .settings-card {
      background: var(--panel);
      border: 1px solid rgba(200,160,64,0.10);
      border-radius: 6px;
      padding: 1.3rem 1.5rem 1.4rem;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      position: relative;
    }

    .settings-card::before {
      content: '';
      position: absolute;
      top: 0; left: 1.2rem; right: 1.2rem;
      height: 1px;
      background: linear-gradient(90deg,transparent,rgba(200,160,64,0.20),transparent);
    }

    .settings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.7rem 1rem;
    }

    .field { display: flex; flex-direction: column; gap: 0.28rem; }
    .field.full { grid-column: 1 / -1; }

    .field label {
      font-family: 'Zen Kaku Gothic Antique', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .field input {
      background: rgba(15,10,5,0.55);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Shippori Mincho', serif;
      font-size: 0.88rem;
      padding: 0.38rem 0.6rem;
      border-radius: 4px;
      outline: none;
      width: 100%;
      transition: border-color 0.3s;
    }

    .field input:focus { border-color: rgba(200,160,64,0.48); }

    .field input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.6) sepia(0.8) saturate(0.6);
      cursor: pointer;
      opacity: 0.55;
    }

    .settings-actions {
      display: flex;
      gap: 0.6rem;
      margin-top: 0.9rem;
      flex-wrap: wrap;
    }

    .btn-save {
      background: rgba(200,160,64,0.12);
      border: 1px solid rgba(200,160,64,0.35);
      color: var(--gold);
      font-family: 'Zen Kaku Gothic Antique', sans-serif;
      font-size: 0.72rem;
      padding: 0.32rem 1rem;
      border-radius: 20px;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: all 0.35s;
    }

    .btn-save:hover { background: rgba(200,160,64,0.2); }

    .btn-del {
      background: transparent;
      border: 1px solid rgba(154,122,80,0.15);
      color: var(--muted);
      font-family: 'Zen Kaku Gothic Antique', sans-serif;
      font-size: 0.68rem;
      padding: 0.32rem 0.8rem;
      border-radius: 20px;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: all 0.35s;
      margin-left: auto;
    }

    .btn-del:hover { border-color: rgba(200,120,64,0.4); color: #c89060; }

    /* ── Window ─────────────────────────── */
    .window-wrap {
      width: 100%;
      max-width: 300px;
      filter: drop-shadow(0 12px 48px rgba(0,0,0,0.75));
    }

    .window-wrap svg { width: 100%; height: auto; display: block; }

    .gp {
      fill: var(--glass-off);
      cursor: pointer;
      transition: fill 1.4s ease, filter 1.6s ease;
      outline: none;
    }

    .gp:hover:not(.lit) { fill: #2a2016; transition: fill 0.22s ease; }

    @keyframes breathe {
      0%,100% { filter: drop-shadow(0 0  7px rgba(240,158,38,0.52)) drop-shadow(0 0  3px rgba(255,210,110,0.30)); }
      50%      { filter: drop-shadow(0 0 13px rgba(240,158,38,0.78)) drop-shadow(0 0  7px rgba(255,210,110,0.50)); }
    }

    .gp.lit { animation: breathe 4.5s ease-in-out infinite; }

    .gl {
      font-family: 'Shippori Mincho', serif;
      font-size: 9.5px;
      fill: rgba(240,228,204,0.28);
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
      letter-spacing: 0.04em;
      transition: fill 1.1s ease;
    }

    .gl.on { fill: rgba(14,9,4,0.72); }

    /* ── Context note ── */
    .ctx-note {
      font-family: 'Zen Kaku Gothic Antique', sans-serif;
      font-size: 0.74rem;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.07em;
      line-height: 1.8;
      min-height: 1.4rem;
      transition: opacity 0.6s ease;
    }

    .ctx-note strong { color: rgba(200,160,64,0.75); font-weight: 400; }

    /* ── Progress ───────────────────────── */
    .prog {
      font-family: 'Zen Kaku Gothic Antique', sans-serif;
      font-size: 0.76rem;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.06em;
      min-height: 1.2rem;
    }

    .prog strong { color: var(--gold); font-weight: 400; }

    /* ── Message card ───────────────────── */
    .card {
      width: 100%;
      background: var(--panel);
      border: 1px solid rgba(200,160,64,0.10);
      border-radius: 6px;
      padding: 1.5rem 1.7rem;
      position: relative;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 24px rgba(0,0,0,0.35);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 1.4rem; right: 1.4rem;
      height: 1px;
      background: linear-gradient(90deg,transparent,rgba(200,160,64,0.22),transparent);
    }

    .card-icon { display:block; font-size:1rem; margin-bottom:0.7rem; opacity:0.65; }

    #msg {
      font-size: 0.9rem;
      line-height: 2.1;
      color: var(--text);
      white-space: pre-line;
      transition: opacity 0.55s ease;
    }

    #msg.fade { opacity: 0; }

    /* ── Reset ──────────────────────────── */
    .reset-btn {
      background: transparent;
      border: 1px solid rgba(154,122,80,0.18);
      color: var(--muted);
      font-family: 'Zen Kaku Gothic Antique', sans-serif;
      font-size: 0.7rem;
      padding: 0.32rem 1.1rem;
      border-radius: 20px;
      cursor: pointer;
      letter-spacing: 0.1em;
      transition: border-color 0.4s, color 0.4s;
    }

    .reset-btn:hover { border-color: rgba(154,122,80,0.5); color: var(--text); }

    /* ── Footer ─────────────────────────── */
    footer {
      font-family: 'Zen Kaku Gothic Antique', sans-serif;
      font-size: 0.66rem;
      letter-spacing: 0.14em;
      color: rgba(154,122,80,0.28);
      text-align: center;
    }

    .logout-btn {
      background: transparent;
      border: none;
      color: rgba(154,122,80,0.28);
      font-family: 'Zen Kaku Gothic Antique', sans-serif;
      font-size: 0.66rem;
      letter-spacing: 0.14em;
      cursor: pointer;
      padding: 0;
      transition: color 0.3s;
    }

    .logout-btn:hover { color: var(--muted); }

    /* ══ AUTH OVERLAY ════════════════════════════ */
    .auth-overlay {
      position: fixed;
      inset: 0;
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse 100% 45% at 50% -2%, rgba(80,52,20,0.45) 0%, transparent 100%),
        radial-gradient(ellipse  60% 30% at 50% 100%, rgba(20,12,5,0.6)  0%, transparent 80%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      z-index: 200;
    }

    .auth-box {
      width: 100%;
      max-width: 340px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.4rem;
    }

    .auth-desc {
      font-family: 'Zen Kaku Gothic Antique', sans-serif;
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.9;
      letter-spacing: 0.05em;
    }

    .auth-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.85rem;
    }

    .auth-email-input {
      background: rgba(15,10,5,0.55);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Zen Kaku Gothic Antique', sans-serif;
      font-size: 16px;
      padding: 0.62rem 1.1rem;
      border-radius: 4px;
      outline: none;
      width: 100%;
      text-align: center;
      transition: border-color 0.3s;
      letter-spacing: 0.03em;
    }

    .auth-email-input:focus { border-color: rgba(200,160,64,0.48); }
    .auth-email-input::placeholder { color: var(--muted); opacity: 0.45; }

    .auth-submit-btn {
      background: rgba(200,160,64,0.12);
      border: 1px solid rgba(200,160,64,0.35);
      color: var(--gold);
      font-family: 'Zen Kaku Gothic Antique', sans-serif;
      font-size: 0.78rem;
      padding: 0.5rem 2rem;
      border-radius: 20px;
      cursor: pointer;
      letter-spacing: 0.12em;
      transition: all 0.35s;
    }

    .auth-submit-btn:hover:not(:disabled) { background: rgba(200,160,64,0.2); }
    .auth-submit-btn:disabled { opacity: 0.5; cursor: default; }

    .auth-sent-msg {
      font-family: 'Zen Kaku Gothic Antique', sans-serif;
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 2;
      letter-spacing: 0.05em;
    }

    .auth-sent-msg strong { color: rgba(200,160,64,0.75); font-weight: 400; }

    /* ══ LOADING ══════════════════════════════════ */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.5s ease;
    }

    .loading-txt {
      font-family: 'Zen Kaku Gothic Antique', sans-serif;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.25em;
      opacity: 0.6;
    }

    /* ══════════════════════════════════════════════
       RESPONSIVE
       ══════════════════════════════════════════════ */

    button, [role="button"] {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    @media (max-width: 479px) {
      body {
        padding: 3vh 0.9rem 0;
        padding-bottom: max(5vh, env(safe-area-inset-bottom, 5vh));
        min-height: 100dvh;
      }

      .app { gap: 1.2rem; }
      h1 { font-size: 1.55rem; }
      .header-sub { font-size: 0.7rem; }
      .settings-grid { grid-template-columns: 1fr; }
      .field input { font-size: 16px; padding: 0.52rem 0.65rem; }

      .subjects-row {
        flex-wrap: nowrap;
        overflow-x: auto;
        justify-content: flex-start;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        padding-bottom: 0.1rem;
        padding-left: 0.1rem;
        padding-right: 0.1rem;
      }
      .subjects-row::-webkit-scrollbar { display: none; }

      .sub-tab, .btn-add-sub {
        padding: 0.52rem 1.05rem;
        font-size: 0.78rem;
        flex-shrink: 0;
      }

      .btn-settings { font-size: 1.1rem; padding: 0.35rem 0.45rem; }
      .card { padding: 1.15rem 1.25rem; }
      #msg  { font-size: 0.87rem; line-height: 2; }
      .ctx-note { font-size: 0.7rem; }
      .prog     { font-size: 0.72rem; }
    }

    @media (min-width: 480px) and (max-width: 639px) {
      .app        { max-width: 420px; }
      .window-wrap{ max-width: 300px; }
    }

    @media (min-width: 640px) and (max-width: 859px) {
      .app         { max-width: 460px; }
      .window-wrap { max-width: 320px; }
    }

    @media (min-width: 860px) {
      body {
        padding: 5vh 2.5rem 8vh;
        align-items: flex-start;
      }

      .app {
        max-width: 820px;
        display: grid;
        grid-template-columns: 290px 1fr;
        grid-template-rows: repeat(7, auto) 1fr;
        column-gap: 3.2rem;
        row-gap: 1.5rem;
        align-items: start;
      }

      .window-wrap {
        grid-column: 1;
        grid-row: 1 / 8;
        max-width: 290px;
        align-self: start;
        position: sticky;
        top: 4vh;
      }

      .ctx-note {
        grid-column: 1;
        grid-row: 8;
        text-align: left;
        padding-top: 0.5rem;
      }

      header { grid-column: 2; grid-row: 1; text-align: left; }

      .subjects-row {
        grid-column: 2; grid-row: 2;
        justify-content: flex-start;
      }

      .settings-wrap { grid-column: 2; grid-row: 3; }

      .prog {
        grid-column: 2; grid-row: 4;
        text-align: left;
      }

      .card  { grid-column: 2; grid-row: 5; }

      .reset-btn {
        grid-column: 2; grid-row: 6;
        align-self: start;
      }

      footer {
        grid-column: 2; grid-row: 7;
        text-align: left;
      }

      h1   { font-size: 2.1rem; }
      #msg { font-size: 0.95rem; line-height: 2.2; }
    }

    @media (min-width: 1100px) {
      .app {
        max-width: 920px;
        grid-template-columns: 320px 1fr;
        column-gap: 4rem;
      }

      .window-wrap { max-width: 320px; }
    }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loading-overlay" class="loading-overlay">
  <p class="loading-txt">読み込み中</p>
</div>

<!-- Auth overlay (shown when not logged in) -->
<div id="auth-overlay" class="auth-overlay" hidden>
  <div class="auth-box">
    <p class="eyebrow">書斎へのかぎ</p>
    <h1>学習のあかり</h1>
    <p class="auth-desc">メールアドレスを入力してください。<br>書斎へのリンクをお送りします。</p>
    <div class="auth-form" id="auth-form">
      <input type="email" id="auth-email" class="auth-email-input"
             placeholder="your@email.com" autocomplete="email" inputmode="email">
      <button id="auth-btn" class="auth-submit-btn">ログインリンクを送る</button>
    </div>
    <p id="auth-sent" hidden class="auth-sent-msg">
      メールをご確認ください。<br>
      リンクをクリックすると<strong>書斎が開きます</strong>。
    </p>
  </div>
</div>

<!-- Main app (shown after login) -->
<div class="app" id="main-app" hidden>

  <header>
    <p class="eyebrow">私だけの書斎</p>
    <h1>学習のあかり</h1>
    <p class="header-sub">放送大学 · ガラスに触れて、静かに進む</p>
  </header>

  <div class="subjects-row" id="subjects-row"></div>

  <div class="settings-wrap" id="settings-wrap">
    <div class="settings-inner">
      <div class="settings-card">
        <div class="settings-grid">
          <div class="field full">
            <label>科目名</label>
            <input type="text" id="f-name" placeholder="例：情報学への誘い">
          </div>
          <div class="field">
            <label>学期の開始日</label>
            <input type="date" id="f-start">
          </div>
          <div class="field">
            <label>単位認定試験の日程</label>
            <input type="date" id="f-exam">
          </div>
        </div>
        <div class="settings-actions">
          <button class="btn-save" id="btn-save">保存する</button>
          <button class="btn-del" id="btn-del">この科目を削除</button>
        </div>
      </div>
    </div>
  </div>

  <div class="window-wrap">
    <svg id="win" viewBox="0 0 300 455" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <clipPath id="ac">
          <path d="M 16 188 Q 16 14 150 5 Q 284 14 284 188 L 284 448 L 16 448 Z"/>
        </clipPath>
        <linearGradient id="sheen" x1="0%" y1="0%" x2="75%" y2="100%">
          <stop offset="0%"   stop-color="rgba(255,255,255,0.055)"/>
          <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
        </linearGradient>
      </defs>

      <path d="M 16 188 Q 16 14 150 5 Q 284 14 284 188 L 284 448 L 16 448 Z" fill="#0b0703"/>

      <g clip-path="url(#ac)" id="pg">
        <rect class="gp" id="p0"  x="19"  y="7"   width="83" height="72" tabindex="0" role="button" aria-label="第1週"/>
        <rect class="gp" id="p1"  x="106" y="7"   width="84" height="72" tabindex="0" role="button" aria-label="第2週"/>
        <rect class="gp" id="p2"  x="194" y="7"   width="83" height="72" tabindex="0" role="button" aria-label="第3週"/>
        <rect class="gp" id="p3"  x="19"  y="83"  width="83" height="72" tabindex="0" role="button" aria-label="第4週"/>
        <rect class="gp" id="p4"  x="106" y="83"  width="84" height="72" tabindex="0" role="button" aria-label="第5週"/>
        <rect class="gp" id="p5"  x="194" y="83"  width="83" height="72" tabindex="0" role="button" aria-label="第6週"/>
        <rect class="gp" id="p6"  x="19"  y="159" width="83" height="72" tabindex="0" role="button" aria-label="第7週"/>
        <rect class="gp" id="p7"  x="106" y="159" width="84" height="72" tabindex="0" role="button" aria-label="第8週"/>
        <rect class="gp" id="p8"  x="194" y="159" width="83" height="72" tabindex="0" role="button" aria-label="第9週"/>
        <rect class="gp" id="p9"  x="19"  y="235" width="83" height="72" tabindex="0" role="button" aria-label="第10週"/>
        <rect class="gp" id="p10" x="106" y="235" width="84" height="72" tabindex="0" role="button" aria-label="第11週"/>

<script>
/* ══════════════════════════════════════════════════════════════
   study haven  —  Supabase版
   ══════════════════════════════════════════════════════════════ */

const SUPABASE_URL = 'https://expdnvdwofkvtkztyckk.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4cGRudmR3b2ZrdnRrenR5Y2trIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5ODgwNDYsImV4cCI6MjA5MTU2NDA0Nn0.cBEPGRJ-cgnvecwWTTSvGPl42v8GA4tgpPzO6_qEAMg';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: { flowType: 'implicit', detectSessionInUrl: true }
});
let currentUser = null;

/* ── DOM refs ─────────────────────────────── */
const loadingOverlay = document.getElementById('loading-overlay');
const authOverlay    = document.getElementById('auth-overlay');
const mainApp        = document.getElementById('main-app');
const authEmailEl    = document.getElementById('auth-email');
const authBtnEl      = document.getElementById('auth-btn');
const authFormEl     = document.getElementById('auth-form');
const authSentEl     = document.getElementById('auth-sent');
const rowEl          = document.getElementById('subjects-row');
const swEl           = document.getElementById('settings-wrap');
const fName          = document.getElementById('f-name');
const fStart         = document.getElementById('f-start');
const fExam          = document.getElementById('f-exam');
const progEl         = document.getElementById('prog');
const ctxEl          = document.getElementById('ctx');
const msgEl          = document.getElementById('msg');
const rstBtn         = document.getElementById('rst');
const panes          = [...document.querySelectorAll('.gp')];
const labels         = [...document.querySelectorAll('.gl')];

/* ── Auth ──────────────────────────────────── */
authBtnEl.addEventListener('click', async () => {
  const email = authEmailEl.value.trim();
  if (!email) return;
  authBtnEl.disabled = true;
  authBtnEl.textContent = '送信中...';
  const { error } = await sb.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: window.location.origin + window.location.pathname }
  });
  if (error) {
    authBtnEl.disabled = false;
    authBtnEl.textContent = 'ログインリンクを送る';
  } else {
    authFormEl.hidden = true;
    authSentEl.hidden = false;
  }
});

authEmailEl.addEventListener('keydown', e => {
  if (e.key === 'Enter') authBtnEl.click();
});

document.getElementById('logout-btn').addEventListener('click', async () => {
  await sb.auth.signOut();
});

/* ── Auth state ────────────────────────────── */

// ページ読み込み時にセッションを確認（マジックリンク対応）
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session?.user) {
    currentUser = session.user;
    await initApp();
    loadingOverlay.hidden = true;
    authOverlay.hidden    = true;
    mainApp.hidden        = false;
  } else {
    loadingOverlay.hidden = true;
    authOverlay.hidden    = false;
  }
})();

// ログイン・ログアウト後の変化を監視
sb.auth.onAuthStateChange(async (event, session) => {
  const user = session?.user ?? null;
  if (user && !currentUser) {
    currentUser = user;
    await initApp();
    loadingOverlay.hidden = true;
    authOverlay.hidden    = true;
    mainApp.hidden        = false;
  } else if (!user && currentUser) {
    currentUser = null;
    state = { subjects: [], currentId: null };
    mainApp.hidden     = true;
    authOverlay.hidden = false;
  }
});

/* ── UUID helper ───────────────────────────── */
function uid() {
  return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
    (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));
}

/* ── Colors & messages ─────────────────────── */
const COLORS = [
  '#c86520','#e89a20','#d07020',
  '#e8ac1e','#bf7420','#d88c1a',
  '#e09c1e','#c86c20','#d89e20',
  '#e08c1e','#c86020','#d8a81a',
  '#cf7c1e','#e0b41e','#c47618',
  '#f0c02c'
];

const MSGS = {
  welcome:  'ようこそ、あなただけの静かな場所へ。\nガラスのピースに触れるだけでいい。急ぐ必要は、ここにはありません。',
  lit: [
    'ステンドグラスに、新しい光が灯りましたね。\nあなたのペースで進んでいる。それが、ここでの唯一の正解です。',
    'また一つ、あたたかな光が生まれました。\n積み重ねはゆっくりでいい。静かな流れが、いつか海に届くように。',
    '灯りが増えるたびに、この書斎が少し明るくなります。\n今日のあなたの時間を、大切に思います。',
    '光が灯ると、鉛線がより美しく見えますね。\nあなたが積み重ねてきた時間が、この光の中にあります。',
    '一つひとつ、ゆっくりと。\nあなたの歩みは、誰かと比べるものではありません。',
  ],
  gentle: [
    '焦らなくて大丈夫です。\n試験まで、まだ十分な余韻があります。今日はゆっくり温かいお茶でも飲みましょう。',
    'たまには立ち止まる時間も、深い理解のためには大切なことがあります。\n窓の外の気配を感じながら、心を休めてくださいね。',
    'ここに戻ってきたとき、灯りはいつも同じ場所で待っています。\nあなたのタイミングで、いつでも。',
  ],
  half:     '半分以上の灯りが、窓を照らし始めています。\n静かに、しかし確かに。あなたは自分の道を歩んでいます。',
  near:     'もう少しです。でも急がなくていい。\nこの光の模様を、しばらく眺めていても構いません。',
  weeksDone:'15週すべての灯りが揃いました。\nこの書斎が、こんなに明るくなる日が来ましたね。\nあとは試験という最後のピースを、あなたのタイミングで。',
  all:      'すべてのステンドグラスに光が灯り、窓が完成しました。\n美しい模様が、あなたの静かな、しかし確かな歩みを証明しています。\nお疲れ様でした。',
  dim: [
    '灯りをそっと消しました。\nまたいつでも、あなたのタイミングで灯してくださいね。',
    '消えた光は、また灯すことができます。\nここはいつも、あなたを待っています。',
  ],
  reset:    'すべての灯りを消しました。\n白紙のステンドグラスも、また美しいものです。\nいつでも、また始めてくださいね。',
  saved:    '設定を保存しました。\n書斎の名前が変わると、また新しい気持ちになれますね。',
};

/* ── Default subject ────────────────────────── */
function defaultSubject(name) {
  return { id: uid(), name: name || '科目1', startDate: '', examDate: '', progress: [] };
}

/* ── Supabase data operations ───────────────── */
async function loadFromSupabase() {
  const { data, error } = await sb.from('subjects')
    .select('*')
    .eq('user_id', currentUser.id)
    .order('sort_order', { ascending: true });

  if (error) {
    console.error('load error:', error);
    const sub = defaultSubject('科目1');
    return { subjects: [sub], currentId: sub.id };
  }

  if (!data || data.length === 0) {
    const sub = defaultSubject('科目1');
    await upsertSubject(sub, 0);
    return { subjects: [sub], currentId: sub.id };
  }

  const subjects = data.map(row => ({
    id:        row.id,
    name:      row.name,
    startDate: row.start_date || '',
    examDate:  row.exam_date  || '',
    progress:  Array.isArray(row.progress) ? row.progress : []
  }));

  return { subjects, currentId: subjects[0].id };
}

async function upsertSubject(sub, order) {
  if (!currentUser) return;
  const { error } = await sb.from('subjects').upsert({
    id:         sub.id,
    user_id:    currentUser.id,
    name:       sub.name,
    start_date: sub.startDate || null,
    exam_date:  sub.examDate  || null,
    progress:   sub.progress,
    sort_order: order
  });
  if (error) console.error('upsert error:', error);
}

async function deleteSubjectRow(id) {
  if (!currentUser) return;
  const { error } = await sb.from('subjects').delete()
    .eq('id', id).eq('user_id', currentUser.id);
  if (error) console.error('delete error:', error);
}

/* ── State ────────────────────────────────── */
let state = { subjects: [], currentId: null };
let settingsOpen = false;
let msgTimer = null;

function current() { return state.subjects.find(s => s.id === state.currentId); }

function save() {
  if (!currentUser) return;
  const sub   = current();
  const order = state.subjects.findIndex(s => s.id === sub.id);
  upsertSubject(sub, order);
}

/* ── Subjects bar ─────────────────────────── */
function renderSubjectsBar() {
  rowEl.innerHTML = '';

  state.subjects.forEach(sub => {
    const btn = document.createElement('button');
    btn.className = 'sub-tab' + (sub.id === state.currentId ? ' active' : '');
    btn.textContent = sub.name;
    btn.addEventListener('click', () => switchSubject(sub.id));
    rowEl.appendChild(btn);
  });

  const addBtn = document.createElement('button');
  addBtn.className = 'btn-add-sub';
  addBtn.textContent = '＋';
  addBtn.title = '新しい科目を追加';
  addBtn.addEventListener('click', addSubject);
  rowEl.appendChild(addBtn);

  const settingsBtn = document.createElement('button');
  settingsBtn.className = 'btn-settings' + (settingsOpen ? ' active' : '');
  settingsBtn.id = 'btn-settings';
  settingsBtn.textContent = '⚙';
  settingsBtn.title = '設定';
  settingsBtn.addEventListener('click', toggleSettings);
  rowEl.appendChild(settingsBtn);
}

/* ── Settings panel ──────────────────────── */
function toggleSettings() {
  settingsOpen = !settingsOpen;
  swEl.classList.toggle('open', settingsOpen);
  renderSubjectsBar();

  if (settingsOpen) {
    const sub = current();
    fName.value  = sub.name;
    fStart.value = sub.startDate || '';
    fExam.value  = sub.examDate  || '';
  }
}

document.getElementById('btn-save').addEventListener('click', () => {
  const sub     = current();
  sub.name      = fName.value.trim() || '科目';
  sub.startDate = fStart.value;
  sub.examDate  = fExam.value;
  save();
  renderSubjectsBar();
  updateContext();
  showMsg('saved');
});

document.getElementById('btn-del').addEventListener('click', () => {
  if (state.subjects.length <= 1) {
    const sub = current();
    const deletedId = sub.id;
    sub.id        = uid();
    sub.name      = '科目1';
    sub.startDate = '';
    sub.examDate  = '';
    sub.progress  = [];
    fName.value  = '科目1';
    fStart.value = '';
    fExam.value  = '';
    deleteSubjectRow(deletedId);
    upsertSubject(sub, 0);
    state.currentId = sub.id;
    renderWindow();
    renderSubjectsBar();
    updateContext();
    updateProg();
    showMsg('reset');
    return;
  }
  const idx       = state.subjects.findIndex(s => s.id === state.currentId);
  const deletedId = state.currentId;
  state.subjects.splice(idx, 1);
  state.currentId = state.subjects[Math.max(0, idx - 1)].id;
  deleteSubjectRow(deletedId);
  settingsOpen = false;
  swEl.classList.remove('open');
  renderSubjectsBar();
  renderWindow();
  updateContext();
  updateProg();
  showMsg('reset');
});

/* ── Add / switch subjects ───────────────── */
function addSubject() {
  const sub = defaultSubject(`科目${state.subjects.length + 1}`);
  state.subjects.push(sub);
  state.currentId = sub.id;
  upsertSubject(sub, state.subjects.length - 1);
  settingsOpen = true;
  swEl.classList.add('open');
  fName.value  = sub.name;
  fStart.value = '';
  fExam.value  = '';
  renderSubjectsBar();
  renderWindow();
  updateContext();
  updateProg();
  msgEl.textContent = MSGS.welcome;
}

function switchSubject(id) {
  if (id === state.currentId && settingsOpen) { toggleSettings(); return; }
  state.currentId = id;
  if (settingsOpen) {
    const sub = current();
    fName.value  = sub.name;
    fStart.value = sub.startDate || '';
    fExam.value  = sub.examDate  || '';
  }
  renderSubjectsBar();
  renderWindow();
  updateContext();
  updateProg();
  msgEl.textContent = MSGS.welcome;
}

/* ── Window render ───────────────────────── */
function lightUp(i, sub) {
  if (!sub.progress.includes(i)) sub.progress.push(i);
  panes[i].style.fill = COLORS[i];
  panes[i].classList.add('lit');
  labels[i].classList.add('on');
}

function dimDown(i, sub) {
  sub.progress = sub.progress.filter(x => x !== i);
  panes[i].style.fill = '';
  panes[i].classList.remove('lit');
  labels[i].classList.remove('on');
}

function renderWindow() {
  const sub    = current();
  const litSet = new Set(sub.progress);
  panes.forEach((p, i) => {
    p.style.fill = '';
    p.classList.remove('lit');
    labels[i].classList.remove('on');
  });
  litSet.forEach(i => {
    if (i >= 0 && i < panes.length) {
      panes[i].style.fill = COLORS[i];
      panes[i].classList.add('lit');
      labels[i].classList.add('on');
    }
  });
}

/* ── Context note ────────────────────────── */
function updateContext() {
  const sub   = current();
  const lines = [];

  if (sub.examDate) {
    const d   = new Date(sub.examDate);
    const m   = d.getMonth() + 1;
    const day = d.getDate();
    const dow = ['日','月','火','水','木','金','土'][d.getDay()];
    lines.push(`試験の目安 <strong>${m}月${day}日（${dow}）</strong>`);
  }

  if (sub.startDate) {
    const start   = new Date(sub.startDate);
    const today   = new Date();
    const diffDays = Math.floor((today - start) / 86400000);
    const weekNum  = Math.floor(diffDays / 7) + 1;
    if (weekNum >= 1 && weekNum <= 15) {
      lines.push(`カレンダー上は <strong>第${weekNum}週</strong> のあたりです`);
    }
  }

  ctxEl.innerHTML = lines.join('　　');
}

/* ── Progress text ───────────────────────── */
function updateProg() {
  const sub   = current();
  const lit   = new Set(sub.progress);
  const weeks = [...lit].filter(i => i < 15).length;
  const exam  = lit.has(15);
  const total = lit.size;

  if (total === 0) {
    progEl.innerHTML = 'まだ灯りが待っています';
  } else if (total === 16) {
    progEl.innerHTML = '<strong>学習の旅、完結</strong>';
  } else {
    let t = `<strong>${weeks}</strong>&thinsp;/&thinsp;15週 完了`;
    if (exam) t += '　試験 <strong>✓</strong>';
    progEl.innerHTML = t;
  }
}

/* ── Message ─────────────────────────────── */
function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function pickMsg(event) {
  const sub   = current();
  const lit   = new Set(sub.progress);
  const weeks = [...lit].filter(i => i < 15).length;
  const total = lit.size;

  if (event === 'saved') return MSGS.saved;
  if (event === 'reset') return MSGS.reset;
  if (event === 'dim')   return rand(MSGS.dim);

  if (total === 16) return MSGS.all;
  if (weeks === 15) return MSGS.weeksDone;
  if (weeks >= 10)  return MSGS.near;
  if (weeks >= 8)   return MSGS.half;

  return Math.random() < 0.28 ? rand(MSGS.gentle) : rand(MSGS.lit);
}

function showMsg(event) {
  if (msgTimer) clearTimeout(msgTimer);
  msgEl.classList.add('fade');
  msgTimer = setTimeout(() => {
    msgEl.textContent = pickMsg(event);
    msgEl.classList.remove('fade');
  }, 560);
}

/* ── Toggle pane ─────────────────────────── */
function togglePane(i) {
  const sub   = current();
  const wasLit = sub.progress.includes(i);
  if (wasLit) { dimDown(i, sub); showMsg('dim'); }
  else        { lightUp(i, sub); showMsg('lit'); }
  save();
  updateProg();
}

/* ── Wire panes ──────────────────────────── */
panes.forEach((p, i) => {
  p.addEventListener('click', () => togglePane(i));
  p.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); togglePane(i); }
  });
});

rstBtn.addEventListener('click', () => {
  const sub = current();
  if (!sub.progress.length) return;
  sub.progress.forEach(i => dimDown(i, sub));
  sub.progress = [];
  save();
  updateProg();
  showMsg('reset');
});

/* ── Init ─────────────────────────────────── */
async function initApp() {
  state = await loadFromSupabase();
  if (!state.subjects.length) state.subjects.push(defaultSubject('科目1'));
  if (!state.currentId || !state.subjects.find(s => s.id === state.currentId)) {
    state.currentId = state.subjects[0].id;
  }
  renderSubjectsBar();
  renderWindow();
  updateContext();
  updateProg();
}
</script>
